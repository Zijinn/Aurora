          type: array
          items:
            type: string
    Feed:
      type: object
      required: [id, url, title, failure_count, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
          format: uri
        canonical_url:
          type: [string, "null"]
          format: uri
        site_url:
          type: [string, "null"]
          format: uri
        title:
          type: string
        description:
          type: [string, "null"]
        icon_url:
          type: [string, "null"]
          format: uri
        format:
          type: [string, "null"]
          enum: [rss, atom, json, null]
        last_checked_at:
          type: [string, "null"]
          format: date-time
        last_success_at:
          type: [string, "null"]
          format: date-time
        failure_count:
          type: integer
          minimum: 0
        last_error_code:
          type: [string, "null"]
        last_error_message:
          type: [string, "null"]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    FeedCandidate:
      type: object
      required: [url, title]
      properties:
        url:
          type: string
          format: uri
        title:
          type: string
        site_url:
          type: [string, "null"]
          format: uri
    CreateFeedRequest:
      type: object
      required: [url]
      properties:
        url:
          type: string
          format: uri
        folder_id:
          type: [string, "null"]
          format: uuid
        title_override:
          type: [string, "null"]
          maxLength: 300
    UpdateFeedRequest:
      type: object
      properties:
        folder_id:
          type: [string, "null"]
          format: uuid
        title_override:
          type: [string, "null"]
          maxLength: 300
        view_mode:
          type: string
