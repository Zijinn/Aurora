          description: HTTP(S) endpoint, exact WebDAV snapshot URL, or local iCloud Drive path.
        enabled:
          type: boolean
        allow_private_network:
          type: boolean
        sync_interval_minutes:
          type: integer
          minimum: 5
          maximum: 10080
        last_sync_at:
          type: [string, "null"]
          format: date-time
        next_sync_at:
          type: [string, "null"]
          format: date-time
        last_attempt_at:
          type: [string, "null"]
          format: date-time
        last_error_code:
          type: [string, "null"]
        last_error_message:
          type: [string, "null"]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    AIProvider:
