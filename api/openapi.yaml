        title:
          type: string
        author:
          type: [string, "null"]
        summary:
          type: [string, "null"]
        ai_translated_title:
          type: [string, "null"]
        ai_summary:
          type: [string, "null"]
        canonical_url:
          type: [string, "null"]
          format: uri
        lead_image_url:
          type: [string, "null"]
          format: uri
        tag_ids:
          type: array
