          type: integer
          minimum: 0
        progress_total:
          type: integer
          minimum: 0
        error_code:
          type: [string, "null"]
        error_message:
          type: [string, "null"]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    Device:
      type: object
      required: [id, name, platform, created_at]
      properties:
        id:
          type: string
          format: uuid
