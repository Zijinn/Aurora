openapi: 3.1.0
info:
  title: Aurora API
  version: 0.1.0
  description: Versioned API shared by Aurora desktop, PWA, and future mobile clients.
  license:
    name: GPL-3.0-only
servers:
  - url: http://127.0.0.1:7381
paths:
  /healthz:
    get:
      operationId: getLiveness
      tags: [system]
      security: []
      responses:
        "200":
          description: Process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
  /api/v1/status:
    get:
      operationId: getStatus
      tags: [system]
      responses:
        "200":
          description: Server readiness and capability status.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Status"
  /api/v1/:
    get:
      operationId: getApiRoot
      tags: [system]
      responses:
        "200":
          description: API identity.
          content:
            application/json:
              schema:
                type: object
                required: [name, api_version]
                properties:
                  name:
                    type: string
                  api_version:
                    type: string
  /api/v1/feeds:
    get:
      operationId: listFeeds
      tags: [feeds]
      responses:
        "200":
          description: Feeds with subscription metadata.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Feed"
    post:
      operationId: createFeed
      tags: [feeds]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFeedRequest"
      responses:
        "201":
          description: Feed and subscription created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feed"
        "400":
          $ref: "#/components/responses/Problem"
  /api/v1/feeds/discover:
    post:
      operationId: discoverFeeds
      tags: [feeds]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [url]
              properties:
                url:
                  type: string
                  format: uri
      responses:
        "200":
          description: Feed candidates discovered from the URL.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/FeedCandidate"
        "400":
          $ref: "#/components/responses/Problem"
  /api/v1/feeds/{feedId}:
    parameters:
      - $ref: "#/components/parameters/FeedId"
    get:
      operationId: getFeed
      tags: [feeds]
      responses:
        "200":
          description: Feed detail.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Feed"
        "404":
          $ref: "#/components/responses/Problem"
    patch:
      operationId: updateFeed
      tags: [feeds]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFeedRequest"
      responses:
        "200":
          description: Updated subscription settings.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Subscription"
        "404":
          $ref: "#/components/responses/Problem"
    delete:
      operationId: deleteFeed
      tags: [feeds]
      responses:
        "204":
          description: Subscription removed. Orphan cleanup is asynchronous.
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/feeds/{feedId}/refresh:
    parameters:
      - $ref: "#/components/parameters/FeedId"
    post:
      operationId: refreshFeed
      tags: [feeds, jobs]
      responses:
        "202":
          description: Refresh job accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
  /api/v1/subscriptions:
    get:
      operationId: listSubscriptions
      tags: [subscriptions]
      responses:
        "200":
          description: Subscription tree source data.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Subscription"
  /api/v1/folders:
    get:
      operationId: listFolders
      tags: [subscriptions]
      responses:
        "200":
          description: Folder hierarchy source data.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Folder"
    post:
      operationId: createFolder
      tags: [subscriptions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFolderRequest"
      responses:
        "201":
          description: Folder created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Folder"
  /api/v1/folders/{folderId}:
    parameters:
      - $ref: "#/components/parameters/FolderId"
    patch:
      operationId: updateFolder
      tags: [subscriptions]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateFolderRequest"
      responses:
        "200":
          description: Folder updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Folder"
        "409":
          $ref: "#/components/responses/Problem"
    delete:
      operationId: deleteFolder
      tags: [subscriptions]
      responses:
        "204":
          description: Folder deleted.
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/entries:
    get:
      operationId: listEntries
      tags: [entries]
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 30
        - name: feed_id
          in: query
          schema:
            type: string
            format: uuid
        - name: folder_id
          in: query
          schema:
            type: string
            format: uuid
        - name: tag_id
          in: query
          schema:
            type: string
            format: uuid
        - name: state
          in: query
          schema:
            type: string
            enum: [all, unread, starred, read_later]
        - name: query
          in: query
          schema:
            type: string
            maxLength: 500
        - name: since
          in: query
          schema:
            type: string
            format: date-time
        - name: ai_language
          in: query
          description: Language used to select cached AI title translations and summaries.
          schema:
            type: string
            maxLength: 40
      responses:
        "200":
          description: Cursor-paginated timeline.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntryPage"
  /api/v1/entries/mark-read:
    post:
      operationId: markEntriesRead
      tags: [entries]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                feed_id:
                  type: string
                  format: uuid
                folder_id:
                  type: string
                  format: uuid
                tag_id:
                  type: string
                  format: uuid
                state:
                  type: string
                  enum: [all, unread, starred, read_later]
                query:
                  type: string
                  maxLength: 500
                since:
                  type: string
                  format: date-time
      responses:
        "200":
          description: Matching unread entries were marked read.
          content:
            application/json:
              schema:
                type: object
                required: [updated]
                properties:
                  updated:
                    type: integer
                    minimum: 0
  /api/v1/entries/{entryId}:
    parameters:
      - $ref: "#/components/parameters/EntryId"
      - name: ai_language
        in: query
        description: Language used to select cached AI title translations and summaries.
        schema:
          type: string
          maxLength: 40
    get:
      operationId: getEntry
      tags: [entries]
      responses:
        "200":
          description: Entry detail and sanitized content.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntryDetail"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/entries/{entryId}/state:
    parameters:
      - $ref: "#/components/parameters/EntryId"
    patch:
      operationId: updateEntryState
      tags: [entries]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateEntryStateRequest"
      responses:
        "200":
          description: Authoritative entry state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EntryState"
  /api/v1/entries/{entryId}/readability:
    parameters:
      - $ref: "#/components/parameters/EntryId"
    post:
      operationId: fetchReadability
      tags: [entries, jobs]
      responses:
        "202":
          description: Full-text extraction job accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
  /api/v1/entries/{entryId}/tags:
    parameters:
      - $ref: "#/components/parameters/EntryId"
    put:
      operationId: setEntryTags
      tags: [entries, tags]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tag_ids]
              properties:
                tag_ids:
                  type: array
                  items:
                    type: string
                    format: uuid
      responses:
        "200":
          description: Entry tags replaced.
          content:
            application/json:
              schema:
                type: object
                required: [tag_ids]
                properties:
                  tag_ids:
                    type: array
                    items:
                      type: string
                      format: uuid
  /api/v1/tags:
    get:
      operationId: listTags
      tags: [tags]
      responses:
        "200":
          description: Profile tags.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TagList"
    post:
      operationId: createTag
      tags: [tags]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTagRequest"
      responses:
        "201":
          description: Tag created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Tag"
  /api/v1/tags/{tagId}:
    delete:
      operationId: deleteTag
      tags: [tags]
      parameters:
        - $ref: "#/components/parameters/TagId"
      responses:
        "204":
          description: Tag deleted.
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/rules:
    get:
      operationId: listRules
      tags: [rules]
      responses:
        "200":
          description: Automation rules.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RuleList"
    post:
      operationId: createRule
      tags: [rules]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateRuleRequest"
      responses:
        "201":
          description: Rule created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Rule"
  /api/v1/rules/{ruleId}:
    delete:
      operationId: deleteRule
      tags: [rules]
      parameters:
        - $ref: "#/components/parameters/RuleId"
      responses:
        "204":
          description: Rule deleted.
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/saved-filters:
    get:
      operationId: listSavedFilters
      tags: [filters]
      responses:
        "200":
          description: Saved timeline filters.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedFilterList"
    post:
      operationId: createSavedFilter
      tags: [filters]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSavedFilterRequest"
      responses:
        "201":
          description: Saved filter created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SavedFilter"
  /api/v1/saved-filters/{filterId}:
    delete:
      operationId: deleteSavedFilter
      tags: [filters]
      parameters:
        - $ref: "#/components/parameters/FilterId"
      responses:
        "204":
          description: Saved filter deleted.
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/imports/opml:
    post:
      operationId: importOpml
      tags: [opml, jobs]
      requestBody:
        required: true
        content:
          application/xml:
            schema:
              type: string
          text/xml:
            schema:
              type: string
      responses:
        "202":
          description: Import job accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
  /api/v1/exports/opml:
    get:
      operationId: exportOpml
      tags: [opml]
      responses:
        "200":
          description: OPML export.
          content:
            text/xml:
              schema:
                type: string
  /api/v1/jobs/{jobId}:
    get:
      operationId: getJob
      tags: [jobs]
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Job state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/jobs/{jobId}/cancel:
    post:
      operationId: cancelJob
      tags: [jobs]
      parameters:
        - name: jobId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Queued or running job cancelled.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "409":
          $ref: "#/components/responses/Problem"
  /api/v1/events:
    get:
      operationId: streamEvents
      tags: [events]
      responses:
        "200":
          description: Server-sent event stream.
          content:
            text/event-stream:
              schema:
                type: string
  /api/v1/backup:
    get:
      operationId: exportBackup
      tags: [backup]
      responses:
        "200":
          description: Complete logical Aurora backup.
          content:
            application/json:
              schema:
                type: object
  /api/v1/restore:
    post:
      operationId: restoreBackup
      tags: [backup]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        "200":
          description: Backup restored transactionally.
        "422":
          $ref: "#/components/responses/Problem"
  /api/v1/devices/pair:
    post:
      operationId: pairDevice
      tags: [devices]
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [code, name, platform]
              properties:
                code:
                  type: string
                  minLength: 6
                  maxLength: 12
                name:
                  type: string
                  minLength: 1
                  maxLength: 120
                platform:
                  type: string
                  enum: [web, ipad, windows, macos, ios, android]
      responses:
        "201":
          description: Device paired. Token is returned only once.
          content:
            application/json:
              schema:
                type: object
                required: [device, token]
                properties:
                  device:
                    $ref: "#/components/schemas/Device"
                  token:
                    type: string
        "400":
          $ref: "#/components/responses/Problem"
  /api/v1/devices/pairing-code:
    post:
      operationId: createPairingCode
      tags: [devices]
      responses:
        "201":
          description: One-time pairing code for a trusted device.
          content:
            application/json:
              schema:
                type: object
                required: [code, expires_at]
                properties:
                  code:
                    type: string
                  expires_at:
                    type: string
                    format: date-time
  /api/v1/devices:
    get:
      operationId: listDevices
      tags: [devices]
      responses:
        "200":
          description: Paired devices without bearer tokens.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/Device"
  /api/v1/devices/{deviceId}:
    delete:
      operationId: revokeDevice
      tags: [devices]
      parameters:
        - $ref: "#/components/parameters/DeviceId"
      responses:
        "204":
          description: Device token revoked.
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/sync/providers:
    get:
      operationId: listSyncProviders
      tags: [sync]
      responses:
        "200":
          description: Supported external synchronization protocols.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/SyncProvider"
  /api/v1/sync/accounts:
    get:
      operationId: listSyncAccounts
      tags: [sync]
      responses:
        "200":
          description: Configured sync accounts without credentials.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/SyncAccount"
    post:
      operationId: createSyncAccount
      tags: [sync]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateSyncAccountRequest"
      responses:
        "201":
          description: Encrypted sync account created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncAccount"
        "400":
          $ref: "#/components/responses/Problem"
  /api/v1/sync/accounts/{accountId}:
    parameters:
      - $ref: "#/components/parameters/SyncAccountId"
    patch:
      operationId: updateSyncAccount
      tags: [sync]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateSyncAccountRequest"
      responses:
        "200":
          description: Sync account updated.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SyncAccount"
        "404":
          $ref: "#/components/responses/Problem"
    delete:
      operationId: deleteSyncAccount
      tags: [sync]
      responses:
        "204":
          description: Sync account and mappings deleted.
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/sync/accounts/{accountId}/sync:
    parameters:
      - $ref: "#/components/parameters/SyncAccountId"
      - name: mode
        in: query
        description: Automatic conflict-aware synchronization, forced upload, or forced cloud restore.
        schema:
          type: string
          enum: [auto, push, pull]
          default: auto
    post:
      operationId: runSyncAccount
      tags: [sync, jobs]
      responses:
        "202":
          description: Account sync job accepted.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Job"
        "409":
          $ref: "#/components/responses/Problem"
  /api/v1/ai/providers:
    get:
      operationId: listAIProviders
      tags: [ai]
      responses:
        "200":
          description: Supported AI provider protocols.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AIProvider"
  /api/v1/ai/profiles:
    get:
      operationId: listAIProfiles
      tags: [ai]
      responses:
        "200":
          description: Configured AI profiles without API keys.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AIProfile"
    post:
      operationId: createAIProfile
      tags: [ai]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAIProfileRequest"
      responses:
        "201":
          description: Encrypted AI profile created.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIProfile"
        "428":
          $ref: "#/components/responses/Problem"
  /api/v1/ai/profiles/{profileId}:
    parameters:
      - $ref: "#/components/parameters/AIProfileId"
    patch:
      operationId: updateAIProfile
      tags: [ai]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateAIProfileRequest"
      responses:
        "200":
          description: AI profile updated without exposing its API key.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIProfile"
        "404":
          $ref: "#/components/responses/Problem"
    delete:
      operationId: deleteAIProfile
      tags: [ai]
      responses:
        "204":
          description: AI profile deleted. Existing results and chats remain without the profile link.
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/ai/usage:
    get:
      operationId: getAIUsage
      tags: [ai]
      responses:
        "200":
          description: Aggregate token usage for the local profile.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIUsage"
  /api/v1/entries/{entryId}/ai-results:
    parameters:
      - $ref: "#/components/parameters/EntryId"
    get:
      operationId: listAIResults
      tags: [entries, ai]
      responses:
        "200":
          description: Cached AI results for the article.
          content:
            application/json:
              schema:
                type: object
                required: [items]
                properties:
                  items:
                    type: array
                    items:
                      $ref: "#/components/schemas/AIResult"
        "404":
          $ref: "#/components/responses/Problem"
  /api/v1/entries/{entryId}/ai/{operation}:
    parameters:
      - $ref: "#/components/parameters/EntryId"
      - name: operation
        in: path
        required: true
        schema:
          type: string
          enum: [summary, title-translation, translation, key-points]
    post:
      operationId: runAIOperation
      tags: [entries, ai, jobs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                profile_id:
                  type: string
                  format: uuid
                language:
                  type: string
                  maxLength: 40
                  default: auto
      responses:
        "200":
          description: Matching cached result returned without a provider request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIStartResponse"
        "202":
          description: AI operation job accepted or an equivalent pending job returned.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIStartResponse"
        "428":
          $ref: "#/components/responses/Problem"
  /api/v1/entries/{entryId}/ai-chat:
    parameters:
      - $ref: "#/components/parameters/EntryId"
    post:
      operationId: startAIChat
      tags: [entries, ai, jobs]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [message]
              properties:
                profile_id:
                  type: string
                  format: uuid
                session_id:
                  type: string
                  format: uuid
                message:
                  type: string
                  minLength: 1
                  maxLength: 4000
      responses:
        "202":
          description: Article chat job accepted.
          content:
            application/json:
              schema:
                type: object
                required: [job, session]
                properties:
                  job:
                    $ref: "#/components/schemas/Job"
                  session:
                    $ref: "#/components/schemas/AIChatSession"
        "428":
          $ref: "#/components/responses/Problem"
  /api/v1/ai/chats/{sessionId}:
    parameters:
      - name: sessionId
        in: path
        required: true
        schema:
          type: string
          format: uuid
    get:
      operationId: getAIChat
      tags: [ai]
      responses:
        "200":
          description: Persisted article chat session and messages.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AIChatSession"
        "404":
          $ref: "#/components/responses/Problem"
components:
  securitySchemes:
    deviceToken:
      type: http
      scheme: bearer
      bearerFormat: AuroraDeviceToken
