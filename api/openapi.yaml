          type: string
          format: uuid
        folder_id:
          type: [string, "null"]
          format: uuid
        title:
          type: string
        icon_url:
          type: [string, "null"]
          format: uri
        feed_url:
          type: string
          format: uri
        site_url:
          type: [string, "null"]
          format: uri
        unread_count:
          type: integer
          minimum: 0
        view_mode:
          type: string
          enum: [compact, standard, card, magazine, image]
