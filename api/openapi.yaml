      required: true
      schema:
        type: string
        format: uuid
    SyncAccountId:
      name: accountId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AIProfileId:
      name: profileId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FolderId:
      name: folderId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TagId:
      name: tagId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RuleId:
      name: ruleId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FilterId:
      name: filterId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DeviceId:
      name: deviceId
