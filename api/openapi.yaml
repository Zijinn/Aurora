          format: uuid
        name:
          type: string
        enabled:
          type: boolean
        priority:
          type: integer
        conditions:
          type: object
          additionalProperties: true
        actions:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
    RuleList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Rule"
    CreateRuleRequest:
      type: object
      required: [name, conditions, actions]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        enabled:
          type: boolean
          default: true
        priority:
          type: integer
        conditions:
          type: object
          additionalProperties: true
        actions:
          type: object
          additionalProperties: true
    SavedFilter:
      type: object
      required: [id, name, query, position, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        query:
          type: object
          additionalProperties: true
        position:
          type: integer
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
