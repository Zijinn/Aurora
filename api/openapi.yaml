          minLength: 1
          maxLength: 120
        endpoint:
          type: string
          description: HTTP(S) endpoint, exact WebDAV snapshot URL, or local iCloud Drive path.
        credentials:
          $ref: "#/components/schemas/SyncCredentials"
        enabled:
          type: boolean
          default: true
        allow_private_network:
          type: boolean
          default: false
        sync_interval_minutes:
          type: integer
          minimum: 5
          maximum: 10080
          default: 30
    UpdateSyncAccountRequest:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 120
        endpoint:
          type: string
          description: HTTP(S) endpoint, exact WebDAV snapshot URL, or local iCloud Drive path.
        credentials:
          $ref: "#/components/schemas/SyncCredentials"
        enabled:
          type: boolean
        allow_private_network:
          type: boolean
        sync_interval_minutes:
          type: integer
          minimum: 5
          maximum: 10080
    SyncAccount:
      type: object
      required: [id, provider, name, endpoint, enabled, allow_private_network, sync_interval_minutes, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        provider:
          type: string
          enum: [freshrss, google_reader, miniflux, fever, feedbin, nextcloud_news, webdav, icloud]
        name:
          type: string
        endpoint:
