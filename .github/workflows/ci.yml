name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v6
        with:
          go-version: "1.25.x"
          cache: true
      - run: go test -race ./...
      - run: go vet ./...
      - run: go build ./cmd/cairn-server
      - run: bash scripts/check-release-config.sh

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11.9.0
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
      - run: pnpm --dir web install --frozen-lockfile
      - run: pnpm --dir web typecheck
      - run: pnpm --dir web lint
      - run: pnpm --dir web test
      - run: pnpm --dir web build
